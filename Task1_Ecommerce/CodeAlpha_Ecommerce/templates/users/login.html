{% extends 'base.html' %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="mb-3 text-center">Connexion</h3>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 mt-2">Se connecter</button>
            </form>
            <p class="text-center mt-3">Pas de compte ? <a href="/users/register/">S'inscrire</a></p>
        </div>
    </div>
</div>
{% endblock %}
